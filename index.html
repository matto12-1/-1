<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rhythm Doctor Prototype</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    :root {
        --bg-color: #0a0a12;
        --track-color: #ffffff;
        --target-color: #ff2a55;
        --blip-color: #00ffcc;
        --text-color: #ffffff;
        
        /* Grid size based on background */
        --grid-size: 40px; 
    }

    body {
        margin: 0;
        padding: 0;
        background-color: #000;
        color: var(--text-color);
        font-family: 'VT323', 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
    }

    /* CRT Monitor Effect */
    body::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
    }

    #game-container {
        width: 100%;
        max-width: 1100px;
        height: 700px;
        background-color: var(--bg-color);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        border: 2px solid #222;
        border-radius: 16px;
    }

    /* --- Hospital Pixel Background --- */
    #bg-layer {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1;
        background: 
            /* Grid lines: 38px transparent, 2px line = 40px total grid size */
            repeating-linear-gradient(to right, transparent, transparent 38px, rgba(0,0,0,0.15) 38px, rgba(0,0,0,0.15) 40px),
            repeating-linear-gradient(to bottom, transparent, transparent 38px, rgba(0,0,0,0.15) 38px, rgba(0,0,0,0.15) 40px),
            linear-gradient(to bottom, #1a2b22 0%, #233d30 55%, #8ba396 55%, #7a8f83 100%);
    }

    .poster {
        position: absolute;
        top: 15%; left: 30%;
        width: 60px; height: 80px;
        background: #e0e0e0;
        border: 4px solid #000;
        box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
    }

    .red-cross {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 12px; height: 36px;
        background: #ff2a55;
    }
    .red-cross::before {
        content: "";
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 36px; height: 12px;
        background: #ff2a55;
    }

    .monitor {
        position: absolute;
        top: 25%; right: 15%;
        width: 100px; height: 80px;
        background: #222;
        border: 4px solid #000;
        border-radius: 8px;
        box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
    }

    .monitor-screen {
        position: absolute;
        top: 8px; left: 8px; right: 8px; bottom: 8px;
        background: #051008;
        border: 2px solid #111;
        overflow: hidden;
    }

    .monitor-line {
        position: absolute;
        top: 50%; left: -100%;
        width: 100%; height: 2px;
        background: #00ffcc;
        box-shadow: 0 0 5px #00ffcc;
        animation: scan 2s linear infinite;
    }

    @keyframes scan {
        0% { left: -100%; }
        100% { left: 100%; }
    }

    .window {
        position: absolute;
        top: 10%; left: 55%;
        width: 120px; height: 100px;
        background: #0a0a1a;
        border: 4px solid #111;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 4px 4px 0 rgba(0,0,0,0.5);
        overflow: hidden;
    }

    .window::after {
        content: "";
        position: absolute;
        top: 0; left: 50%; bottom: 0; width: 4px;
        background: #111;
        transform: translateX(-50%);
    }
    .window::before {
        content: "";
        position: absolute;
        top: 50%; left: 0; right: 0; height: 4px;
        background: #111;
        transform: translateY(-50%);
    }

    .stars {
        width: 2px; height: 2px;
        background: white;
        position: absolute;
        top: 20px; left: 30px;
        box-shadow: 40px 10px 0 white, 80px 40px 0 white, 20px 50px 0 white, 60px 70px 0 white;
        animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    /* --- Canvas Doctor Character --- */
    .doctor-character {
        position: absolute;
        top: 50%;
        left: 0; /* Aligned with the start of the container */
        width: 120px;
        height: 120px;
        z-index: 5;
        transform: translate(-20%, -50%); /* Slightly overlap the start of the line */
        transform-origin: center;
        transition: transform 0.1s;
        image-rendering: pixelated;
        filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5));
    }

    /* Bobbing animation for the doctor */
    @keyframes doctorBob {
        0% { transform: translate(-20%, -50%); }
        50% { transform: translate(-20%, calc(-50% - 6px)); }
        100% { transform: translate(-20%, -50%); }
    }
    .doctor-bob {
        animation: doctorBob 0.2s ease-out;
    }

    /* Screen Shake Animation */
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }

    .shake {
        animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* Flash Effect */
    #flash-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: white;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
        transition: opacity 0.1s ease-out;
    }

    #exit-btn {
        position: absolute;
        bottom: 20px;
        right: 30px;
        font-size: 24px;
        color: #fff;
        cursor: pointer;
        z-index: 1000;
        border: 4px solid #fff;
        padding: 5px 15px;
        background: rgba(0,0,0,0.8);
        box-shadow: 4px 4px 0 #000;
        display: none; /* Hidden by default */
    }

    #exit-btn:hover {
        background: #fff;
        color: #000;
    }

    .pixel-text {
        text-transform: uppercase;
        text-shadow: 3px 3px 0 #000;
        letter-spacing: 2px;
    }

    #ui-layer {
        position: absolute;
        top: 20px;
        left: 30px;
        right: 30px;
        display: flex;
        justify-content: space-between;
        font-size: 36px;
        z-index: 10;
    }

    /* ECG Track SVG */
    #tracks-wrapper {
        position: absolute;
        top: 50%;
        left: calc(20% - 120px); 
        width: calc(80% + 120px);
        height: 400px;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 20px;
        z-index: 2;
    }

    .track-container {
        position: relative;
        width: 100%;
        height: 120px;
    }

    svg {
        width: 100%;
        height: 100%;
        overflow: visible;
    }

    .track-line {
        fill: none;
        stroke: var(--track-color);
        stroke-width: 6;
        stroke-linecap: square;
        stroke-linejoin: miter;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
    }

    .track-target {
        fill: none;
        stroke: var(--target-color);
        stroke-width: 8;
        stroke-linecap: square;
        stroke-linejoin: miter;
        filter: drop-shadow(0 0 12px var(--target-color));
    }

    /* Player Blip Container */
    .blip-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        pointer-events: none;
    }

    .blip {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: var(--blip-color);
        transform: translate(-50%, -50%);
        box-shadow: 0 0 15px var(--blip-color), 0 0 30px #fff;
        border-radius: 50%;
        will-change: left, top;
    }

    .ripple {
        position: absolute;
        width: 20px;
        height: 20px;
        border: 4px solid var(--blip-color);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        opacity: 1;
        z-index: 4;
        animation: expandRipple 0.4s ease-out forwards;
        pointer-events: none;
    }

    @keyframes expandRipple {
        0% { width: 20px; height: 20px; opacity: 1; border-width: 6px; }
        100% { width: 150px; height: 150px; opacity: 0; border-width: 1px; }
    }

    #judgment {
        position: absolute;
        top: 30%;
        left: 60%;
        transform: translate(-50%, -50%) scale(0.5);
        font-size: 80px;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
        font-weight: bold;
        text-align: center;
    }

    @keyframes popIn {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        40% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    #judgment.show {
        animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Screens */
    .overlay-screen {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgb(10, 10, 18);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 30;
    }

    .title {
        font-size: 96px;
        margin-bottom: 0;
        text-align: center;
        line-height: 0.9;
        color: #fff;
        text-shadow: 6px 6px 0 var(--target-color), -4px -4px 0 var(--blip-color);
    }

    .subtitle {
        font-size: 32px;
        color: #aaa;
        margin-bottom: 30px;
        letter-spacing: 4px;
    }

    /* Stage Selection Menu */
    .stage-menu {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 20px;
        width: 80%;
    }

    .stage-btn {
        background: #111;
        color: #fff;
        border: 2px solid #444;
        padding: 4px 6px;
        font-family: 'VT323', monospace;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.1s;
        box-shadow: 2px 2px 0 #000;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .stage-btn:hover {
        border-color: var(--blip-color);
        color: var(--blip-color);
        transform: translateY(-1px);
        box-shadow: 2px 3px 0 #000;
    }

    .stage-btn.active {
        border-color: var(--target-color);
        color: var(--target-color);
    }

    .stage-btn:active {
        transform: translateY(1px);
        box-shadow: 1px 1px 0 #000;
    }

    .blink-text {
        font-size: 36px;
        color: var(--blip-color);
        animation: blink 1s step-end infinite;
        text-shadow: 0 0 10px var(--blip-color);
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

</style>
</head>
<body>

<div id="game-container">
    <div id="flash-overlay"></div>
    
    <!-- Hospital Background -->
    <div id="bg-layer">
        <div class="poster">
            <div class="red-cross"></div>
        </div>
        <div class="window">
            <div class="stars"></div>
        </div>
        <div class="monitor">
            <div class="monitor-screen">
                <div class="monitor-line"></div>
            </div>
        </div>
    </div>
    
    <div id="ui-layer">
        <div id="score" class="pixel-text">SCORE: 0</div>
        <div id="stage-info" class="pixel-text" style="color: #fff;">STAGE: 4/4</div>
        <div id="combo" class="pixel-text" style="color: var(--blip-color);">COMBO: 0 / 15</div>
    </div>

    <div id="exit-btn" class="pixel-text">EXIT</div>
    
    <div id="tracks-wrapper">
        <div id="track-1" class="track-container">
            <!-- Canvas Pixel Art Doctor Character -->
            <canvas id="doctor-character-1" class="doctor-character" width="96" height="96"></canvas>

            <!-- SVG path will be generated dynamically based on stage -->
            <svg class="track-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path class="svg-line track-line" d="" />
                <path class="svg-target track-target" d="" />
            </svg>
            <div class="blip-container"></div>
        </div>
        <div id="track-2" class="track-container" style="display: none;">
            <!-- Canvas Pixel Art Doctor Character -->
            <canvas id="doctor-character-2" class="doctor-character" width="96" height="96"></canvas>

            <!-- SVG path will be generated dynamically based on stage -->
            <svg class="track-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path class="svg-line track-line" d="" />
                <path class="svg-target track-target" d="" />
            </svg>
            <div class="blip-container"></div>
        </div>
        <div id="track-3" class="track-container" style="display: none;">
            <!-- Canvas Pixel Art Doctor Character -->
            <canvas id="doctor-character-3" class="doctor-character" width="96" height="96"></canvas>

            <!-- SVG path will be generated dynamically based on stage -->
            <svg class="track-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path class="svg-line track-line" d="" />
                <path class="svg-target track-target" d="" />
            </svg>
            <div class="blip-container"></div>
        </div>
    </div>
    
    <div id="judgment" class="pixel-text"></div>
    
    <!-- Start Screen & Stage Selection -->
    <div id="start-screen" class="overlay-screen">
        <div style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 20px;">
            <div style="position: absolute; right: 50%; margin-right: 180px; display: flex; align-items: center; gap: 10px; z-index: 10;">
                <canvas id="menu-doctor-character" width="96" height="96" style="image-rendering: pixelated;"></canvas>
                <button id="story-btn" class="stage-btn" style="position: relative; font-size: 12px; padding: 10px 15px 10px 35px; margin: 0; background: #8b0000; border: 4px solid #fff; color: #fff; box-shadow: 4px 4px 0 #000; border-radius: 2px;">
                    <div style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px;">
                        <div style="position: absolute; top: 5px; left: 0; width: 15px; height: 5px; background: #fff;"></div>
                        <div style="position: absolute; top: 0; left: 5px; width: 5px; height: 15px; background: #fff;"></div>
                    </div>
                    설명서
                </button>
            </div>
            <h1 class="title pixel-text" style="margin: 0;">RHYTHM<br>DOCTOR</h1>
        </div>
        <div class="subtitle pixel-text">SELECT STAGE</div>
        
        <div class="stage-menu" id="stage-menu-container">
            <!-- Buttons will be generated dynamically -->
        </div>

        <div class="custom-song-container" id="custom-song-container" style="margin-top: 20px; display: none; flex-direction: column; align-items: center; gap: 10px;">
            <div class="pixel-text" style="font-size: 12px; color: var(--blip-color);">CUSTOM STAGE 8 GENERATOR</div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="custom-song-input" placeholder="Enter song name..." class="pixel-text" style="background: rgba(0,0,0,0.5); border: 1px solid var(--blip-color); color: white; padding: 5px 10px; font-size: 10px; width: 150px;">
                <button id="generate-btn" class="stage-btn" style="padding: 5px 10px; font-size: 10px; width: auto; margin: 0;">GENERATE</button>
            </div>
            <div id="gen-status" class="pixel-text" style="font-size: 8px; color: #ffff33; display: none;">GENERATING...</div>
        </div>
        
        <div class="blink-text pixel-text" id="goal-text">GOAL: 15 COMBO PER PATIENT</div>
    </div>

    <!-- Story Screen (Visual Novel Style) -->
    <div id="story-screen" class="overlay-screen" style="display: none; z-index: 2000; background: rgb(10, 15, 20); position: absolute; overflow: hidden; cursor: pointer;">
        <!-- Image Container -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 150px;">
            <div id="image-loading-text" class="pixel-text blink-text" style="position: absolute; color: #00ffcc; font-size: 24px; z-index: 10; display: none;">GENERATING IMAGE...</div>
            <img id="tutorial-image" src="" alt="Tutorial" style="max-width: 90%; max-height: 80%; object-fit: contain; border: 4px solid #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.3), inset 0 0 20px rgba(0,0,0,0.5); border-radius: 12px; background: #000; opacity: 0;">
        </div>

        <!-- Dialog UI -->
        <div style="position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 800px; height: 180px; background: rgba(0, 0, 0, 0.9); border: 4px solid #fff; border-radius: 8px; padding: 25px; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; flex-direction: column; text-align: left;">
            <!-- Name Plate -->
            <div id="story-speaker" class="pixel-text" style="position: absolute; top: -20px; left: -4px; background: #00ffcc; color: #000; padding: 5px 15px; border: 4px solid #fff; font-size: 18px; font-weight: bold; text-shadow: none; box-shadow: 4px 4px 0 #000;">닥터 비트</div>
            
            <!-- Dialog Text -->
            <div id="story-text" class="pixel-text" style="color: #fff; font-size: 25px; line-height: 1.6; text-shadow: none; word-break: keep-all; text-transform: none;"></div>
            
            <!-- Next Indicator -->
            <div class="blink-text pixel-text" style="position: absolute; bottom: 15px; right: 20px; color: #00ffcc; font-size: 14px; text-shadow: none;">▼ 클릭해서 진행</div>
        </div>
    </div>

    <!-- Clear Screen -->
    <div id="clear-screen" class="overlay-screen" style="display: none;">
        <h1 class="title pixel-text" style="color: #00ffcc; text-shadow: 6px 6px 0 #000, -4px -4px 0 #fff;">PATIENT<br>SAVED!</h1>
        <div class="subtitle pixel-text" style="color: #fff;">CLEAR TIME: <span id="clear-time">0.00</span>s</div>
        <div class="blink-text pixel-text">PRESS TO RETURN TO MENU</div>
    </div>
</div>

<script type="module">
    import { GoogleGenAI, Type } from "@google/genai";

    async function loadTutorialImage() {
        const imgEl = document.getElementById('tutorial-image');
        const loadingText = document.getElementById('image-loading-text');
        const cachedImage = localStorage.getItem('tutorialImage');
        
        if (cachedImage) {
            imgEl.src = cachedImage;
            imgEl.style.opacity = "1";
            loadingText.style.display = "none";
            return;
        }

        if (!process.env.GEMINI_API_KEY) {
            console.error("GEMINI_API_KEY is missing! Please check Vercel Environment Variables.");
            imgEl.src = "https://picsum.photos/seed/rhythmdoctor_error/800/600";
            imgEl.style.opacity = "1";
            loadingText.style.display = "none";
            return;
        }

        loadingText.style.display = "block";
        try {
            const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
            const response = await ai.models.generateContent({
                model: 'gemini-2.5-flash-image',
                contents: 'High quality pixel art of a crazy doctor with green spiky hair and round glasses, wearing a white lab coat and colorful clothes, playing a keytar that shoots a rainbow beam. In a hospital room setting with a digital sign saying "120 BPM". Floating music notes, retro 16-bit game style.',
            });
            for (const part of response.candidates[0].content.parts) {
                if (part.inlineData) {
                    const base64EncodeString = part.inlineData.data;
                    const imageUrl = `data:image/png;base64,${base64EncodeString}`;
                    imgEl.src = imageUrl;
                    imgEl.style.opacity = "1";
                    loadingText.style.display = "none";
                    localStorage.setItem('tutorialImage', imageUrl);
                    break;
                }
            }
        } catch (e) {
            console.error("Failed to generate image:", e);
            // Fallback to a themed placeholder if AI fails
            imgEl.src = "https://picsum.photos/seed/rhythmdoctor_doctor/800/600";
            imgEl.style.opacity = "1";
            loadingText.style.display = "none";
        }
    }
    
    loadTutorialImage();

    let audioCtx;
    let isPlaying = false;
    let startTime;
    let gameStartTime;
    let currentBeatInBar = 0;
    let nextNoteTime = 0.0;
    let tempo = 100;
    let secondsPerBeat = 60.0 / tempo;
    let secondsPerBar;
    let lookahead = 25.0;
    let scheduleAheadTime = 3.0; // Increased to allow blips to be seen for their full journey
    let timerID;
    let totalBeatsElapsed = 0;

    let currentTracks = []; // Array of track configurations
    let TARGET_COMBO = 15;
    let score = 0;
    let combo = 0;
    let expectedHits = [];
    let lastBeatDrawn = -1;

    // Custom Melody Storage
    let customMelodyData = null;
    let unlockedStage = parseInt(localStorage.getItem('rhythmUnlockedStageV2')) || 1;

    const STAGES = {
        1: { name: '4/4', tracks: [{ beats: 4, hits: [3] }], bpm: 100 },
        2: { name: '2/4', tracks: [{ beats: 2, hits: [1] }], bpm: 100 },
        3: { name: '3/4', tracks: [{ beats: 3, hits: [2] }], bpm: 110 },
        4: { name: '6/8', tracks: [{ beats: 6, hits: [5] }], bpm: 140 },
        5: { name: '5/4', tracks: [{ beats: 5, hits: [4] }], bpm: 120 },
        6: { name: '7/8', tracks: [{ beats: 7, hits: [6] }], bpm: 150 },
        7: { name: 'DUAL 9 & 4', tracks: [{ beats: 9, hits: [8] }, { beats: 4, hits: [3] }], bpm: 120 },
        8: { name: 'CHOPSTICKS', tracks: [{ beats: 3, hits: [0, 1, 2] }, { beats: 6, hits: [2, 5] }], bpm: 150 },
        9: { name: 'BOSS', tracks: [
            { beats: 7, hits: [6] },
            { beats: 5, hits: [4] },
            { beats: 4, hits: [3] }
        ], bpm: 130 }
    };

    // AI Generation Logic
    async function generateCustomStage(songName) {
        const statusEl = document.getElementById('gen-status');
        const btn = document.getElementById('generate-btn');
        const stage8Btn = document.getElementById('stage-8-btn');
        
        statusEl.style.display = 'block';
        statusEl.innerText = 'ANALYZING SONG...';
        btn.disabled = true;

        try {
            const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
            const response = await ai.models.generateContent({
                model: "gemini-3-flash-preview",
                contents: `Generate a rhythm game stage for the song "${songName}". 
                The game is like Rhythm Doctor where you hit on specific beats of a bar.
                Return JSON with:
                - bpm (number, 80-180)
                - beatsPerBar (number, usually 4, 3, 7, etc)
                - hitBeats (array of numbers, which beats in the bar to hit, 0-indexed. Usually the last beat of the bar)
                - melody (array of objects with {barIndex, notes: [freq1, freq2, ...]}) 
                  Provide at least 8 bars of melody. Use frequencies like 261.63 (C4), 293.66 (D4), etc.`,
                config: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: Type.OBJECT,
                        properties: {
                            bpm: { type: Type.NUMBER },
                            beatsPerBar: { type: Type.NUMBER },
                            hitBeats: { type: Type.ARRAY, items: { type: Type.NUMBER } },
                            melody: {
                                type: Type.ARRAY,
                                items: {
                                    type: Type.OBJECT,
                                    properties: {
                                        barIndex: { type: Type.NUMBER },
                                        notes: { type: Type.ARRAY, items: { type: Type.NUMBER } }
                                    }
                                }
                            }
                        },
                        required: ["bpm", "beatsPerBar", "hitBeats", "melody"]
                    }
                }
            });

            const data = JSON.parse(response.text);
            
            // Update Stage 8
            STAGES[8] = {
                name: songName.toUpperCase(),
                tracks: [{ beats: data.beatsPerBar, hits: data.hitBeats }],
                bpm: data.bpm
            };
            customMelodyData = data.melody;
            
            stage8Btn.innerText = `8: ${songName.toUpperCase()}`;
            statusEl.innerText = 'GENERATED SUCCESS!';
            setTimeout(() => { statusEl.style.display = 'none'; }, 2000);
        } catch (error) {
            console.error(error);
            statusEl.innerText = 'ERROR GENERATING. TRY AGAIN.';
        } finally {
            btn.disabled = false;
        }
    }

    // --- Dynamic SVG Generation ---
    function generateTrackSVG(trackIdx) {
        const track = trackElements[trackIdx];
        const svgLine = track.line;
        const svgTarget = track.target;
        
        // Target is fixed further to the right
        const targetX = 850;

    // Retro Sound Synthesis
    function playMelodyNote(time, beatInBar, barIndex) {
        if (!audioCtx) return;
        
        let notes = [];
        const stageName = document.getElementById('stage-info').innerText;

        if (stageName.includes('CHOPSTICKS') && !customMelodyData) {
            // Default Chopsticks Melody Pattern (3/4 time)
            const melody = [
                [349.23, 392.00], // F4, G4
                [329.63, 392.00], // E4, G4
                [293.66, 493.88], // D4, B4
                [261.63, 523.25]  // C4, C5
            ];
            notes = melody[barIndex % 4];
        } else if (customMelodyData) {
            const barData = customMelodyData.find(m => m.barIndex === (barIndex % customMelodyData.length));
            if (barData) notes = barData.notes;
        }
        
        if (notes.length === 0) return;

        const volumeMultiplier = stageName.includes('CHOPSTICKS') || customMelodyData ? 0.75 : 1.0;
        
        notes.forEach(freq => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, time);
            
            gain.gain.setValueAtTime(0.15 * volumeMultiplier, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(time);
            osc.stop(time + 0.3);
        });
    }

    function playKick(time) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.1);
        
        gain.gain.setValueAtTime(1, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(time);
        osc.stop(time + 0.1);
    }

    function playSnare(time) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(250, time);
        
        gain.gain.setValueAtTime(0.3, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(time);
        osc.stop(time + 0.15);
    }

    function playHitSound(time, type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        const stageName = document.getElementById('stage-info').innerText;
        const volumeMultiplier = stageName.includes('CHOPSTICKS') ? 0.5 : 1.0;
        
        if (type === 'PERFECT') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, time); // A5
            gain.gain.setValueAtTime(0.2 * volumeMultiplier, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
        } else if (type === 'GOOD') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, time); // A4
            gain.gain.setValueAtTime(0.2 * volumeMultiplier, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, time);
            gain.gain.setValueAtTime(0.3 * volumeMultiplier, time);
            gain.gain.linearRampToValueAtTime(0.01, time + 0.2);
        }
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.3);
    }

    function playVictorySound(time) {
        if (!audioCtx) return;
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, time + i * 0.15);
            
            gain.gain.setValueAtTime(0, time + i * 0.15);
            gain.gain.linearRampToValueAtTime(0.2, time + i * 0.15 + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, time + i * 0.15 + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time + i * 0.15);
            osc.stop(time + i * 0.15 + 0.3);
        });
    }

    function scheduleNote(trackIdx, beatNumber, time) {
        const track = currentTracks[trackIdx];
        const stageName = document.getElementById('stage-info').innerText;
        
        if (track.hits.includes(beatNumber)) {
            // Special handling for CHOPSTICKS or Custom stage
            if (stageName.includes('CHOPSTICKS') || customMelodyData) {
                const barIndex = Math.floor(totalBeatsElapsed / track.beats);
                playMelodyNote(time, beatNumber, barIndex);
            } else if (trackIdx === 1) {
                playHitSound(time, 'GOOD');
            } else {
                playSnare(time);
            }
            expectedHits.push({ time: time, hit: false, evaluated: false, trackIdx: trackIdx });
        } else {
            if (trackIdx === 0 && !stageName.includes('CHOPSTICKS') && !customMelodyData) playKick(time);
        }
    }

    function nextNote() {
        nextNoteTime += secondsPerBeat;
        totalBeatsElapsed++;
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            currentTracks.forEach((track, idx) => {
                const beatInBar = totalBeatsElapsed % track.beats;
                scheduleNote(idx, beatInBar, nextNoteTime);
            });
            nextNote();
        }
        timerID = setTimeout(scheduler, lookahead);
    }

    function showMenu() {
        isPlaying = false;
        if (audioCtx) {

            audioCtx = null;

        document.getElementById('start-screen').style.display = 'flex';

    function startGame(stageId) {
        const stage = STAGES[stageId];
        currentTracks = stage.tracks;
        tempo = stage.bpm;
        secondsPerBeat = 60.0 / tempo;
        totalBeatsElapsed = 0;
        
        TARGET_COMBO = currentTracks.length * 15;
        
        document.getElementById('stage-info').innerText = `STAGE: ${stage.name}`;
        document.getElementById('exit-btn').style.display = 'block';
        
        // Setup tracks
        trackElements.forEach((el, idx) => {
            if (idx < currentTracks.length) {
                el.container.style.display = 'block';
                generateTrackSVG(idx);
                drawDoctor(el.doctor.id);
            } else {
                el.container.style.display = 'none';
            }
        });

        if (audioCtx) audioCtx.close();
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        isPlaying = true;
        score = 0;
        combo = 0;
        expectedHits = [];
        lastBeatDrawn = -1;
        
        nextNoteTime = audioCtx.currentTime + 0.5;
        startTime = nextNoteTime;
        gameStartTime = audioCtx.currentTime;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('clear-screen').style.display = 'none';
        
        updateUI();
        scheduler();
        requestAnimationFrame(draw);
    }

    function gameClear() {
        isPlaying = false;
        clearTimeout(timerID);
        document.getElementById('exit-btn').style.display = 'none';
        
        // Unlock next stage
        const currentStageId = parseInt(document.getElementById('stage-info').innerText.split(' ')[1].split(':')[0]); // Extract stage number from "STAGE: 1: 4/4" -> wait, stage.name doesn't have number.
        // Let's find current stage ID by name or just track it
        let currentStageKey = 1;
        for (let key in STAGES) {
            if (STAGES[key].name === document.getElementById('stage-info').innerText.replace('STAGE: ', '')) {
                currentStageKey = parseInt(key);
                break;
            }
        }
        
        if (currentStageKey >= unlockedStage && currentStageKey < 9) {
            unlockedStage = currentStageKey + 1;
            localStorage.setItem('rhythmUnlockedStageV2', unlockedStage);
        }
        
        const clearTime = (audioCtx.currentTime - gameStartTime).toFixed(2);
        document.getElementById('clear-time').innerText = clearTime;
        
        setTimeout(() => {
            document.getElementById('clear-screen').style.display = 'flex';

    function createRipple(x, y, color, trackIdx) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = x + '%';
        ripple.style.top = y + '%';
        ripple.style.borderColor = color;

        setTimeout(() => {

        }, 400);
    }

    function draw() {
        if (!isPlaying) return;
        
        const currentTime = audioCtx.currentTime;
        
        if (currentTime >= startTime) {
            const targetX = 850;
            const startX = 60;
            const travelDurationFull = 4 * secondsPerBeat;
            const speed = 1000 / travelDurationFull;
            
            // Hide all blips initially
            blipPool.forEach(b => b.style.display = 'none');
            
            let blipIdx = 0;
            expectedHits.forEach(hit => {
                const timeToTravelToTarget = (targetX - startX) / speed;
                const blipStartTime = hit.time - timeToTravelToTarget;
                const blipEndTime = blipStartTime + (1000 - startX) / speed;
                
                if (currentTime >= blipStartTime && currentTime <= blipEndTime && blipIdx < blipPool.length) {
                    const blipAge = currentTime - blipStartTime;
                    const x = startX + blipAge * speed;
                    
                    let y = 50;
                    if (x > targetX - 30 && x <= targetX - 15) {
                        y = 50 + 20 * ((x - (targetX - 30)) / 15);
                    } else if (x > targetX - 15 && x <= targetX) {
                        y = 70 - 60 * ((x - (targetX - 15)) / 15);
                    } else if (x > targetX && x <= targetX + 15) {
                        y = 10 + 70 * ((x - targetX) / 15);
                    } else if (x > targetX + 15 && x <= targetX + 30) {
                        y = 80 - 30 * ((x - (targetX + 15)) / 15);
                    }
                    
                    const b = blipPool[blipIdx++];
                    b.style.display = 'block';
                    b.style.left = (x / 10) + '%';
                    b.style.top = y + '%';
                    
                    // Move blip to correct track container
                    const trackIdx = hit.trackIdx || 0;
                    trackElements[trackIdx].blipContainer.appendChild(b);
                }
            });
            
            const elapsedTime = currentTime - startTime;
            const currentBeatFloat = elapsedTime / secondsPerBeat;
            const currentBeatInt = Math.floor(currentBeatFloat);
            
            if (currentBeatInt > lastBeatDrawn) {
                lastBeatDrawn = currentBeatInt;
                
                currentTracks.forEach((track, idx) => {
                    const el = trackElements[idx];
                    el.doctor.classList.remove('doctor-bob');
                    void el.doctor.offsetWidth;
                    el.doctor.classList.add('doctor-bob');
                });
                
                container.style.boxShadow = '0 0 80px rgba(0, 255, 204, 0.2)';
                setTimeout(() => {
                    container.style.boxShadow = '0 0 50px rgba(0, 0, 0, 0.8)';
                }, 100);
            }
        }
        
        for (let i = 0; i < expectedHits.length; i++) {
            let hitObj = expectedHits[i];
            if (!hitObj.evaluated && currentTime > hitObj.time + 0.2) {
                hitObj.evaluated = true;
                if (!hitObj.hit) {
                    showJudgment('MISS', '#ff2a55');
                    combo = 0;
                    updateUI();
                    triggerScreenShake();
                }
            }
        }
        
        expectedHits = expectedHits.filter(h => currentTime <= h.time + 1.0);
        
        if (isPlaying) {
            requestAnimationFrame(draw);
        }
    }

    function handleInput() {
        if (!isPlaying) return;
        
        const currentTime = audioCtx.currentTime;
        const targetXPercent = 85; 
        const targetYPercent = 10; 
        
        let hitsProcessed = 0;
        
        // Check all expected hits and process any that are within the timing window
        for (let i = 0; i < expectedHits.length; i++) {
            let hitObj = expectedHits[i];
            if (!hitObj.evaluated && !hitObj.hit) {
                let diff = Math.abs(currentTime - hitObj.time);
                
                // If within hit window (0.3s)
                if (diff <= 0.3) {
                    hitObj.hit = true;
                    hitObj.evaluated = true;
                    hitsProcessed++;
                    
                    const trackIdx = hitObj.trackIdx || 0;
                    
                    if (diff <= 0.08) {
                        showJudgment('PERFECT', '#00ffcc');
                        score += 100;
                        combo++;
                        playHitSound(currentTime, 'PERFECT');
                        triggerFlash('#ffffff');
                        createRipple(targetXPercent, targetYPercent, '#00ffcc', trackIdx);
                        triggerScreenShake();
                    } else if (diff <= 0.2) {
                        showJudgment('GOOD', '#ffff33');
                        score += 50;
                        combo++;
                        playHitSound(currentTime, 'GOOD');
                        createRipple(targetXPercent, targetYPercent, '#ffff33', trackIdx);
                    } else {
                        showJudgment('MISS', '#ff2a55');
                        combo = 0;
                        playHitSound(currentTime, 'MISS');
                        triggerScreenShake();
                    }
                    
                    // Visual feedback on the specific character
                    const doctorEl = trackElements[trackIdx].doctor;
                    doctorEl.style.transform = 'translate(-20%, -50%) scale(1.2)';
                    setTimeout(() => {
                        doctorEl.style.transform = 'translate(-20%, -50%) scale(1)';
                    }, 100);
                }
            }
        }
        
        if (hitsProcessed === 0) {
            // Penalty for random clicking (only if no hits were found in range)
            combo = 0;
            updateUI();
            showJudgment('MISS', '#ff2a55');
            triggerScreenShake();
            playHitSound(currentTime, 'MISS');
            triggerFlash('#ff0000');
        } else {
            updateUI();
            checkClear();
        }
    }

    function checkClear() {
        if (combo >= TARGET_COMBO) {
            gameClear();
        }
    }

    function showJudgment(text, color) {
        const el = document.getElementById('judgment');
        el.innerText = text;
        el.style.color = color;
        el.style.textShadow = `4px 4px 0 #000, 0 0 30px ${color}`;

        el.classList.add('show');
        
        clearTimeout(el.hideTimeout);
        el.hideTimeout = setTimeout(() => {

    }

    function updateUI() {
        document.getElementById('score').innerText = `SCORE: ${score}`;
        document.getElementById('combo').innerText = `COMBO: ${combo} / ${TARGET_COMBO}`;
        
        const comboEl = document.getElementById('combo');

        }
    }

    // Draw the pixel art doctor
    function drawDoctor(canvasId) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const pixelSize = 4; // 24x24 grid * 4 = 96x96 canvas
        
        const art = [
          "        GGGGGG          ",
          "       GGGGGGGG         ",
          "      GGGGGGGGGG        ",
          "      GG0G00GGGG        ",
          "      G0WW0WW0GG        ",
          "      G0WW0WW0G         ",
          "      GGS0SS0S          ",
          "       GSSWWSS          ",
          "        SSWWS           ",
          "       WWWWWWWW         ",
          "      WW YRGY WW        ",
          "     WW  YRYG  WW       ",
          "    WW   RGYR   WW      ",
          "   WW DDDDDDDDDDDD      ",
          "   W DKWKWKWKWBWBWD     ",
          "     DKWKWKWKWBWBWD     ",
          "     DDDDDDDDDDDDDD     ",
          "       WWWWWWWW         ",
          "        PPPPPP          ",
          "        PBGPPP          ",
          "       PP    BP         ",
          "       GP    PP         ",
          "      TTT    TTT        ",
          "      TTT    TTT        "
        ];
        
        const colors = {
            'G': '#00b894', // Green hair
            '0': '#2d3436', // Glasses frame
            'W': '#ffffff', // White coat/keys
            'S': '#ffeaa7', // Skin
            'Y': '#fdcb6e', // Yellow shirt
            'R': '#d63031', // Red shirt
            'D': '#636e72', // Dark gray keytar
            'K': '#2d3436', // Black keys
            'B': '#0984e3', // Blue buttons/pants
            'P': '#6c5ce7', // Purple pants
            'T': '#00cec9', // Teal shoes
            ' ': 'transparent'
        };
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < art.length; y++) {
            for (let x = 0; x < art[y].length; x++) {
                const char = art[y][x];
                if (char !== ' ') {
                    ctx.fillStyle = colors[char];
                    ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                }
            }
        }
    }
    
    const storyLines = [
        { speaker: "닥터 비트", text: "어서오게, 신입! 우리 리듬 병원에 온 걸 환영하네." },
        { speaker: "나", text: "감사합니다! 근데... 그 키타는 뭔가요?" },
        { speaker: "닥터 비트", text: "하하! 이건 내 특수 제세동기라네. 음악으로 심장을 뛰게 만들지!" },
        { speaker: "닥터 비트", text: "환자들의 심박 주기를 잘 듣고..." },
        { speaker: "닥터 비트", text: "정확한 타이밍에 [스페이스바]를 눌러 리듬을 맞춰주게!" },
        { speaker: "나", text: "스페이스바... 알겠습니다." },
        { speaker: "닥터 비트", text: "환자마다 박자가 다르니 리듬을 타는 게 중요해. 기본은 120 BPM!" },
        { speaker: "닥터 비트", text: "가끔은 두 명, 세 명의 환자를 동시에 치료해야 할 수도 있다네. (환자 1명당 15콤보 필요)" },
        { speaker: "닥터 비트", text: "자, 무지개빛 음악에 몸을 맡기고 환자들을 살려보게! 락앤롤!" },
        { speaker: "나", text: "(심호흡을 한다) ...좋아, 해보자!" }
    ];
    let currentStoryIndex = 0;

    function showStory() {
        document.getElementById('story-screen').style.display = 'flex';
        currentStoryIndex = 0;
        updateStoryUI();
    }

    function updateStoryUI() {
        const line = storyLines[currentStoryIndex];
        const speakerEl = document.getElementById('story-speaker');
        const textEl = document.getElementById('story-text');
        const tutorialImage = document.getElementById('tutorial-image');
        
        speakerEl.innerText = line.speaker;
        textEl.innerText = line.text;
        
        if (line.speaker === "나") {
            speakerEl.style.background = "#fff";
            speakerEl.style.color = "#000";
            tutorialImage.style.opacity = "0.5";
            tutorialImage.style.transform = "scale(0.98)";
            tutorialImage.style.transition = "all 0.3s ease";
        } else {
            speakerEl.style.background = "#00ffcc";
            speakerEl.style.color = "#000";
            tutorialImage.style.opacity = "1";
            tutorialImage.style.transform = "scale(1)";
            tutorialImage.style.transition = "all 0.3s ease";
        }
    }

    function nextStory() {
        currentStoryIndex++;
        if (currentStoryIndex >= storyLines.length) {
            document.getElementById('story-screen').style.display = 'none';
        } else {
            updateStoryUI();
        }
    }

    document.getElementById('story-btn').addEventListener('click', showStory);
    document.getElementById('story-screen').addEventListener('click', nextStory);
    document.getElementById('exit-btn').addEventListener('click', exitToMenu);
    document.getElementById('clear-screen').addEventListener('click', showMenu);
    
    // Initialize menu on load
    renderMenu();
    
    drawDoctor('doctor-character-1');
    drawDoctor('doctor-character-2');
    drawDoctor('doctor-character-3');
    drawDoctor('menu-doctor-character');
    window.startGame = startGame;
    window.showMenu = showMenu;
    window.handleInput = handleInput;
    window.exitToMenu = exitToMenu;
    window.showStory = showStory;
    window.nextStory = nextStory;
</script>
</body>
</html>
